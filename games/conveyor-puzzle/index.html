<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conveyor Puzzle</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #111; overflow: hidden; }
      canvas { display: block; width: 100vw; height: 100vh; }

      #hud {
        position: fixed;
        top: 16px;
        right: 16px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
        font-family: monospace;
        color: #eee;
        user-select: none;
        pointer-events: none;
      }

      #hud .row {
        display: flex;
        gap: 8px;
        pointer-events: auto;
      }

      #level-display {
        font-size: 11px;
        color: #666;
        letter-spacing: 0.08em;
      }

      #level-title {
        font-size: 13px;
        color: #ccc;
        font-weight: bold;
      }

      #phase-label {
        font-size: 11px;
        color: #888;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      #sink-counter {
        font-size: 15px;
        color: #00ccff;
        font-weight: bold;
      }

      #hud button {
        padding: 7px 18px;
        border: 1px solid #555;
        background: #1e1e1e;
        color: #eee;
        font-family: monospace;
        font-size: 13px;
        cursor: pointer;
        border-radius: 3px;
        letter-spacing: 0.04em;
      }

      #hud button:hover:not(:disabled) { background: #2e2e2e; border-color: #888; }
      #hud button:disabled { opacity: 0.3; cursor: default; }

      #win-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.72);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        font-family: monospace;
        color: #eee;
      }

      #win-overlay h1 {
        font-size: 52px;
        color: #00ccff;
        letter-spacing: 0.06em;
      }

      #win-overlay p {
        font-size: 16px;
        color: #aaa;
      }

      #win-overlay button {
        padding: 10px 32px;
        border: 1px solid #00ccff;
        background: transparent;
        color: #00ccff;
        font-family: monospace;
        font-size: 15px;
        cursor: pointer;
        border-radius: 3px;
        letter-spacing: 0.06em;
      }

      #win-overlay button:hover { background: rgba(0,204,255,0.1); }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div id="hud">
      <span id="level-display">Level 1 / 8</span>
      <span id="level-title">First Delivery</span>
      <span id="phase-label">Planning</span>
      <span id="sink-counter">0 / 2</span>
      <div class="row">
        <button id="btn-run">Run</button>
        <button id="btn-reset" disabled>Reset</button>
      </div>
    </div>

    <div id="win-overlay">
      <h1>You Win!</h1>
      <p id="win-message">All items delivered.</p>
      <div class="row" style="pointer-events:auto">
        <button id="btn-next-level">Next Level</button>
        <button id="btn-play-again">Retry</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
