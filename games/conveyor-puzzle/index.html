<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conveyor — Line Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <!-- Shared status rail (always visible, sits above all screens) -->
      <header class="rail" role="banner">
        <span class="rail__system">CONVEYOR · LINE CONTROL</span>
        <span class="rail__context" id="rail-context" aria-live="polite"></span>
      </header>

      <!-- ── Landing ──────────────────────────────────────────────────────── -->
      <main id="screen-landing" class="screen" aria-label="Welcome">
        <div class="landing__stage">
          <p class="landing__eyebrow">THROUGHPUT PUZZLES</p>
          <h1 class="landing__wordmark">CONVEYOR</h1>
          <p class="landing__tagline">Route the materials. Meet the quota.</p>

          <!-- Animated conveyor band — purely decorative -->
          <div class="landing__belt" aria-hidden="true">
            <div class="belt-track">
              <span class="belt-item belt-item--ore"></span>
              <span class="belt-item belt-item--ore"></span>
              <span class="belt-item belt-item--coolant"></span>
              <span class="belt-item belt-item--ore"></span>
              <span class="belt-item belt-item--coolant"></span>
              <span class="belt-item belt-item--coolant"></span>
              <span class="belt-item belt-item--ore"></span>
            </div>
          </div>

          <button class="btn-primary" id="btn-start">START LINE</button>
          <p class="landing__hint">8 lines to master</p>
        </div>
      </main>

      <!-- ── Level select ─────────────────────────────────────────────────── -->
      <main id="screen-levels" class="screen" aria-label="Select a line">
        <div class="levels-header">
          <h2 class="levels-title">SELECT LINE</h2>
          <p class="levels-sub">Route each line to unlock the next</p>
        </div>
        <div id="levels-map" role="list" aria-label="Lines"></div>
      </main>

      <!-- ── Game ─────────────────────────────────────────────────────────── -->
      <main id="screen-game" class="screen" aria-label="Game">
        <canvas id="canvas"></canvas>

        <!-- HUD overlay -->
        <div id="hud" role="complementary" aria-label="Controls">
          <div class="hud__back">
            <button id="btn-back" class="btn-ghost btn-ghost--small">&#8592; Lines</button>
          </div>

          <div class="hud__info">
            <span class="hud__code" id="level-code">LV.01</span>
            <span class="hud__title" id="level-title">First Delivery</span>
          </div>

          <span
            class="hud__lamp"
            id="status-lamp"
            data-phase="planning"
            role="status"
            aria-label="Phase: planning"
            >PLANNING</span
          >

          <div class="hud__gauge" aria-label="Items delivered">
            <span class="hud__gauge-label">DELIVERED</span>
            <span class="hud__gauge-count" id="sink-gauge">0 / 2</span>
          </div>

          <div class="hud__controls">
            <button id="btn-run" class="btn-action btn-action--run">Run</button>
            <button id="btn-reset" class="btn-action" disabled>Reset</button>
          </div>

          <p class="hud__hint" aria-hidden="true">Click place belt &middot; Right-click rotate</p>
        </div>

        <!-- Win overlay -->
        <div
          id="win-overlay"
          role="dialog"
          aria-label="Level complete"
          aria-modal="true"
          aria-hidden="true"
        >
          <div class="win-panel">
            <p class="win-eyebrow">DELIVERY CONFIRMED</p>
            <h2 class="win-headline">&#10003;</h2>
            <p class="win-message" id="win-message">All items delivered.</p>
            <div class="win-actions">
              <button id="btn-next-level" class="btn-primary">Next Line</button>
              <button id="btn-level-select" class="btn-ghost">Level Select</button>
              <button id="btn-play-again" class="btn-ghost">Retry</button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
